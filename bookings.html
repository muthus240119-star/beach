<!DOCTYPE html>
<html>
<head>
<title>Spa Booking</title>
<style>
body{
    background-image: url(b.png);
    background-size: cover;
    text-align:center;
}
.box{
    width:400px;
    background: rgba(255,255,255,0.8);
    padding:30px;
    border-radius:10px;
    margin:auto;
    margin-top:50px;
}
input, select{
    margin:10px 0;
    height:40px;
    width:100%;
}
button{
    padding:10px;
    background:#0d2c4a;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="box">
<form action="spabook.php" method="POST">

<h2>BOOK YOUR SPA</h2>

<input type="text" name="username" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<input type="text" name="phone" placeholder="Phone Number" required>

<label>Select Spa Type</label>
<select name="spa_type" required>
<option value="">Select Spa</option>
<option value="Basic Spa">Basic Spa - 1200</option>
<option value="Aromatherapy Spa">Aromatherapy Spa - 2500</option>
<option value="Luxury Spa">Luxury Spa - 4000</option>
</select>

<label>Date</label>
<input type="date" name="date" required>

<label>Time</label>
<input type="time" name="time" required>

<input type="number" name="duration" placeholder="Duration (Hours)" required>

<button type="submit">Book Now</button>

</form>
</div>

</body>
</html>
