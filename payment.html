<script>
function validate(){
    let card = document.getElementById("card").value;
    let cvv = document.getElementById("cvv").value;

    if(card.length < 12){
        alert("Invalid Card Number");
        return false;
    }

    if(cvv.length != 3){
        alert("Invalid CVV");
        return false;
    }

    alert("Payment Successful");
    return true; // allow form to go to PHP
}
